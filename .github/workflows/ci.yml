name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-long-enough-for-hs256
          JWT_REFRESH_SECRET: ci-test-refresh-secret-different-from-access
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          MONGODB_URI: mongodb://localhost:27017/commute_test
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder-service-key
          SUPABASE_CDN_URL: https://placeholder.supabase.co/storage/v1/object/public/posts
          SUPABASE_STORAGE_BUCKET: posts
          CORS_ORIGINS: http://localhost:3000
        run: npm test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:5001/api
        run: npm test -- --watchAll=false --passWithNoTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          REACT_APP_API_URL: http://localhost:5001/api
        run: npm run build
